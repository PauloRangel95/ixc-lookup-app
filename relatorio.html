<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Relatório — IXC Lookup</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:Arial,Helvetica,sans-serif;color:#111;margin:28px;font-size:12px}
    h1{font-size:18px;margin:0 0 2px}
    h2{font-size:13px;margin:18px 0 6px;border-bottom:1px solid #ccc;padding-bottom:3px}
    .muted{color:#666;font-size:11px;margin-bottom:14px}
    table{width:100%;border-collapse:collapse;margin-top:6px}
    th,td{border:1px solid #ccc;padding:5px 7px;text-align:left;font-size:11px;vertical-align:top}

    .tcenter{text-align:center}
    .ok{color:#0a7d33}
    .err{color:#c0202a;font-weight:600}
    .toolbar{margin-bottom:16px}
    .toolbar button{font-size:13px;padding:7px 14px;border:1px solid #888;background:#f2f4f7;border-radius:6px;cursor:pointer}
    @media print{ body{margin:12mm} .toolbar{display:none} }

</head>
<body>
  <div class="toolbar"><button id="btn-imprimir">🖨 Imprimir / Salvar PDF</button></div>
